<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>asciitextwall</title>

    <!-- Import PyScript stuff -->
    <!-- <link rel="stylesheet" href="https://pyscript.net/releases/2026.6.1/core.css" /> -->
    <script type="module" src="https://pyscript.net/releases/2026.6.1/core.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <header>
      <h1>asciitextwall</h1>
      <a href="https://github.com/MrE8065/asciitextwall" target="_blank">
        <svg viewBox="0 0 1024 1024" fill="none">
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M8 0C3.58 0 0 3.58 0 8C0 11.54 2.29 14.53 5.47 15.59C5.87 15.66 6.02 15.42 6.02 15.21C6.02 15.02 6.01 14.39 6.01 13.72C4 14.09 3.48 13.23 3.32 12.78C3.23 12.55 2.84 11.84 2.5 11.65C2.22 11.5 1.82 11.13 2.49 11.12C3.12 11.11 3.57 11.7 3.72 11.94C4.44 13.15 5.59 12.81 6.05 12.6C6.12 12.08 6.33 11.73 6.56 11.53C4.78 11.33 2.92 10.64 2.92 7.58C2.92 6.71 3.23 5.99 3.74 5.43C3.66 5.23 3.38 4.41 3.82 3.31C3.82 3.31 4.49 3.1 6.02 4.13C6.66 3.95 7.34 3.86 8.02 3.86C8.7 3.86 9.38 3.95 10.02 4.13C11.55 3.09 12.22 3.31 12.22 3.31C12.66 4.41 12.38 5.23 12.3 5.43C12.81 5.99 13.12 6.7 13.12 7.58C13.12 10.65 11.25 11.33 9.47 11.53C9.76 11.78 10.01 12.26 10.01 13.01C10.01 14.08 10 14.94 10 15.21C10 15.42 10.15 15.67 10.55 15.59C13.71 14.53 16 11.53 16 8C16 3.58 12.42 0 8 0Z"
            transform="scale(64)" fill="#c5c9c5" />
        </svg>
      </a>
    </header>

    <main>
      <div class="container">
        <form class="controls" id="controls-form">
          <h2>Controls</h2>
          <p>Text</p>
          <input type="text" id="text-input" placeholder="Hello, World" required>
          <p>Font</p>
          <select id="figlet-font-select"></select>
          <p>Text Size (px)</p>
          <input type="number" id="txt-size-input" placeholder="15" min="1" required>
          <p>Text max width (px)</p>
          <input type="number" id="txt-width-input" placeholder="160" min="1" required>
          <p>Image size</p>
          <div class="sizes-controls">
            <input type="number" id="img-width-input" placeholder="1920" min="1" required>
            <input type="number" id="img-height-input" placeholder="1080" min="1" required>
          </div>
          <p>Background color</p>
          <input type="color" id="bg-color-input" value="#000000">
          <p>Text color</p>
          <input type="color" id="txt-color-input" value="#00ff00">
          <button id="save-button" class="button" type="submit">Generate image</button>
        </form>

        <div class="results">
          <img src="https://dummyimage.com/1920x1080/000/fff" alt="DummyImage" id="img-display">
          <button class="button" id="download-button" disabled>Download the image</button>
        </div>
      </div>
    </main>

    <footer>
      <p>
        Made by
        <a href="https://github.com/MrE8065/" target="_blank" class="name-link">MrE8065</a>
      </p>
    </footer>

    <script type="py" src="./main.py" config="./pyscript.json"></script>
  </body>

</html>
